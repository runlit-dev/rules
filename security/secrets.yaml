# runlit security rules — hardcoded secrets and credential patterns
# License: Apache 2.0
# These supplement Gitleaks (which covers regex-based patterns).
# These catch structural patterns that regex misses: assigning secrets to variables, logging them, etc.

rules:
  # ── Generic secret patterns ─────────────────────────────────────────────────

  - id: runlit-security/hardcoded-api-key-assignment
    languages: [python, typescript, javascript, go]
    severity: CRITICAL
    message: >
      Possible hardcoded API key or secret assigned directly in code.
      API keys should come from environment variables or a secrets manager.
    patterns:
      - pattern: api_key = "sk-..."
      - pattern: API_KEY = "..."
      - pattern: const apiKey = "sk-..."
      - pattern: apiKey := "sk-..."
    metadata:
      category: security
      cwe: "CWE-798"
    fix: Use `os.environ["API_KEY"]` (Python), `process.env.API_KEY` (Node.js), or `os.Getenv("API_KEY")` (Go).

  - id: runlit-security/secret-in-log
    languages: [python]
    severity: HIGH
    message: >
      Possible secret or token passed to a logging call. Never log credentials.
    patterns:
      - pattern: logging.info(..., password, ...)
      - pattern: logging.debug(..., token, ...)
      - pattern: print(f"...{password}...")
      - pattern: print(f"...{api_key}...")
    metadata:
      category: security
      cwe: "CWE-312"
    fix: Remove credential values from log output. Log only non-sensitive identifiers.

  # ── Python specific ─────────────────────────────────────────────────────────

  - id: runlit-security/python-eval-on-input
    languages: [python]
    severity: CRITICAL
    message: >
      `eval()` called with user-supplied or external input — arbitrary code execution risk.
    patterns:
      - pattern: eval(request.data)
      - pattern: eval(request.body)
      - pattern: eval($INPUT)
    metadata:
      category: security
      cwe: "CWE-94"
    fix: Remove `eval()`. Parse input with `json.loads()` or a typed schema validator.

  - id: runlit-security/python-pickle-loads
    languages: [python]
    severity: CRITICAL
    message: >
      `pickle.loads()` on untrusted data enables arbitrary code execution.
    patterns:
      - pattern: pickle.loads(request.data)
      - pattern: pickle.loads($UNTRUSTED)
    metadata:
      category: security
      cwe: "CWE-502"
    fix: Use `json.loads()` or a safe serialization format. Never unpickle untrusted data.

  - id: runlit-security/python-subprocess-shell-true
    languages: [python]
    severity: HIGH
    message: >
      `subprocess.run(..., shell=True)` with interpolated variables is vulnerable to shell injection.
    patterns:
      - pattern: subprocess.run(f"...", shell=True)
      - pattern: subprocess.call(f"...", shell=True)
      - pattern: os.system(f"...")
    metadata:
      category: security
      cwe: "CWE-78"
    fix: Use `subprocess.run([...], shell=False)` with a list of arguments. Never build shell commands from user input.

  # ── TypeScript / Node.js ────────────────────────────────────────────────────

  - id: runlit-security/node-eval
    languages: [typescript, javascript]
    severity: CRITICAL
    message: >
      `eval()` with user-supplied input enables code injection.
    patterns:
      - pattern: eval(req.body)
      - pattern: eval(req.query.$X)
      - pattern: eval($INPUT)
    metadata:
      category: security
      cwe: "CWE-94"
    fix: Remove `eval()`. Parse input with `JSON.parse()` and validate with a schema library.

  - id: runlit-security/node-child-process-shell
    languages: [typescript, javascript]
    severity: HIGH
    message: >
      `exec()` or `execSync()` with template literals is vulnerable to command injection.
    patterns:
      - pattern: exec(`...${ ... }...`)
      - pattern: execSync(`...${ ... }...`)
    metadata:
      category: security
      cwe: "CWE-78"
    fix: Use `spawn()` with an arguments array, or `execFile()`. Never build commands from user input.

  # ── Go ──────────────────────────────────────────────────────────────────────

  - id: runlit-security/go-sql-format-injection
    languages: [go]
    severity: CRITICAL
    message: >
      SQL query built with `fmt.Sprintf` and user input — SQL injection risk.
    patterns:
      - pattern: db.Query(fmt.Sprintf("...%s...", $USERINPUT))
      - pattern: db.Exec(fmt.Sprintf("...%s...", $USERINPUT))
    metadata:
      category: security
      cwe: "CWE-89"
    fix: Use parameterized queries: `db.Query("SELECT ... WHERE id = $1", userInput)`.
