# runlit community rules — OpenAI SDK hallucinations
# License: Apache 2.0
# Verified against openai-python changelog and openai-node changelog (March 2026).

rules:
  # ── Python ──────────────────────────────────────────────────────────────────

  - id: runlit-hallucination/openai-python/edit-endpoint-removed
    languages: [python]
    severity: ERROR
    message: >
      `openai.Edit` (and `client.edits.create()`) was deprecated 2023-07-06 and removed 2024-01-04.
      This endpoint no longer exists — requests will 404.
    patterns:
      - pattern: openai.Edit.create(...)
      - pattern: $CLIENT.edits.create(...)
    metadata:
      category: hallucination
      library: openai-python
      removed_date: "2024-01-04"
      cwe: null
    fix: Use `client.chat.completions.create()` with a system prompt describing the editing task.

  - id: runlit-hallucination/openai-python/legacy-completion
    languages: [python]
    severity: WARNING
    message: >
      `openai.Completion.create()` (legacy completions) was deprecated 2023-07-06.
      It will eventually be removed. Prefer Chat Completions.
    pattern: openai.Completion.create(...)
    metadata:
      category: deprecated
      library: openai-python
      verified_against: ">=1.0.0"
    fix: Use `client.chat.completions.create(model="gpt-4o", messages=[...])`.

  - id: runlit-hallucination/openai-python/v0-api-key-pattern
    languages: [python]
    severity: WARNING
    message: >
      `openai.api_key = ...` is the openai v0.x pattern. openai v1.0+ uses a client instance.
      This will raise `AttributeError` if openai>=1.0.0 is installed.
    pattern: openai.api_key = $KEY
    metadata:
      category: deprecated
      library: openai-python
      breaking_version: "1.0.0"
    fix: Use `from openai import OpenAI; client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])`.

  - id: runlit-hallucination/openai-python/chatcompletion-v0
    languages: [python]
    severity: WARNING
    message: >
      `openai.ChatCompletion.create()` is the openai v0.x API.
      In openai>=1.0.0 this raises `AttributeError`.
    pattern: openai.ChatCompletion.create(...)
    metadata:
      category: deprecated
      library: openai-python
      breaking_version: "1.0.0"
    fix: Use `client.chat.completions.create(model=..., messages=...)`.

  - id: runlit-hallucination/openai-python/stream-hallucinated-method
    languages: [python]
    severity: ERROR
    message: >
      `.stream_to_file()` does not exist on OpenAI responses. Hallucinated streaming method.
    pattern: $RESPONSE.stream_to_file(...)
    metadata:
      category: hallucination
      library: openai-python
      verified_against: ">=1.0.0"

  # ── TypeScript / Node.js ────────────────────────────────────────────────────

  - id: runlit-hallucination/openai-node/v3-configuration-import
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      `Configuration` and `OpenAIApi` were removed in openai-node v4.0 (November 2023).
      Imports like `import { Configuration, OpenAIApi } from 'openai'` will fail at runtime.
    patterns:
      - pattern: import { Configuration, OpenAIApi } from 'openai'
      - pattern: import { Configuration } from 'openai'
    metadata:
      category: hallucination
      library: openai-node
      removed_version: "4.0.0"
    fix: Use `import OpenAI from 'openai'; const client = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });`.

  - id: runlit-hallucination/openai-node/legacy-createcompletion
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      `openai.createCompletion()` is the v3.x API. In openai-node v4+, use `client.completions.create()`.
    pattern: $OPENAI.createCompletion(...)
    metadata:
      category: deprecated
      library: openai-node
      breaking_version: "4.0.0"
    fix: Use `client.chat.completions.create({ model: "gpt-4o", messages: [...] })`.

  - id: runlit-hallucination/openai-node/legacy-createchatcompletion
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      `openai.createChatCompletion()` is the v3.x API. In openai-node v4+, use `client.chat.completions.create()`.
    pattern: $OPENAI.createChatCompletion(...)
    metadata:
      category: deprecated
      library: openai-node
      breaking_version: "4.0.0"
    fix: Use `client.chat.completions.create({ model: "gpt-4o", messages: [...] })`.

  # ── Python: Assistants v2 / Files / Images / Audio ─────────────────────────

  - id: runlit-hallucination/openai-python/assistants-v1-file-ids
    languages: [python]
    severity: ERROR
    message: >
      `assistant.file_ids` was removed in the Assistants v2 API (April 2024).
      Files are now attached via `tool_resources` with a `vector_store`.
      AI models trained before mid-2024 produce the old `file_ids` pattern.
    patterns:
      - pattern: client.beta.assistants.create(..., file_ids=..., ...)
      - pattern: client.beta.assistants.update(..., file_ids=..., ...)
    metadata:
      category: hallucination
      library: openai-python
      removed_version: "v2 Assistants API"
      verified_against: ">=1.14.0"
    fix: >
      # Upload file and create vector store
      vs = client.beta.vector_stores.create()
      client.beta.vector_stores.files.create(vector_store_id=vs.id, file_id=file_id)
      client.beta.assistants.create(
          model="gpt-4o",
          tools=[{"type": "file_search"}],
          tool_resources={"file_search": {"vector_store_ids": [vs.id]}}
      )

  - id: runlit-hallucination/openai-python/assistants-v1-files-create
    languages: [python]
    severity: ERROR
    message: >
      `client.beta.assistants.files.create()` was removed in Assistants v2 (April 2024).
      Use `client.beta.vector_stores.files.create()` instead.
    pattern: $CLIENT.beta.assistants.files.create(...)
    metadata:
      category: hallucination
      library: openai-python
      removed_version: "v2 Assistants API"
    fix: client.beta.vector_stores.files.create(vector_store_id=vs_id, file_id=file_id)

  - id: runlit-hallucination/openai-python/dalle-v0-image-create
    languages: [python]
    severity: ERROR
    message: >
      `openai.Image.create()` is the openai v0.x DALL-E API.
      In openai>=1.0.0 use `client.images.generate()`.
    pattern: openai.Image.create(...)
    metadata:
      category: deprecated
      library: openai-python
      breaking_version: "1.0.0"
    fix: >
      response = client.images.generate(model="dall-e-3", prompt="...", n=1, size="1024x1024")
      url = response.data[0].url

  - id: runlit-hallucination/openai-python/audio-transcribe-v0
    languages: [python]
    severity: ERROR
    message: >
      `openai.Audio.transcribe()` is the openai v0.x API.
      In openai>=1.0.0, use `client.audio.transcriptions.create()`.
    patterns:
      - pattern: openai.Audio.transcribe(...)
      - pattern: openai.Audio.translate(...)
    metadata:
      category: deprecated
      library: openai-python
      breaking_version: "1.0.0"
    fix: >
      with open("audio.mp3", "rb") as f:
          transcript = client.audio.transcriptions.create(model="whisper-1", file=f)

  - id: runlit-hallucination/openai-python/outdated-model-names
    languages: [python]
    severity: WARNING
    message: >
      Outdated GPT model name. As of March 2026, recommended models are `gpt-4o`,
      `gpt-4o-mini`, `o3`, `o4-mini`. AI models frequently hallucinate old model IDs.
    patterns:
      - pattern: model="gpt-4-turbo-preview"
      - pattern: model="gpt-4-0613"
      - pattern: model="gpt-4-32k"
      - pattern: model="gpt-3.5-turbo-0301"
      - pattern: model="text-davinci-003"
      - pattern: model="text-davinci-002"
    metadata:
      category: deprecated
      library: openai-python
      verified_against: "March 2026"
    fix: Use `model="gpt-4o"` or `model="gpt-4o-mini"` for production.

  - id: runlit-hallucination/openai-python/o1-wrong-parameters
    languages: [python]
    severity: ERROR
    message: >
      `o1`, `o3`, and `o4` reasoning models do not support `system` role messages,
      `temperature`, `top_p`, or `stream` parameters in many configurations.
      AI models often apply standard Chat Completions parameters to reasoning models.
    patterns:
      - pattern: client.chat.completions.create(model="o1", ..., temperature=..., ...)
      - pattern: client.chat.completions.create(model="o3", ..., temperature=..., ...)
      - pattern: client.chat.completions.create(model="o4-mini", ..., temperature=..., ...)
    metadata:
      category: hallucination
      library: openai-python
      verified_against: "March 2026"
    fix: >
      # o-series reasoning models: omit temperature, top_p; use max_completion_tokens
      client.chat.completions.create(
          model="o3",
          messages=[{"role": "user", "content": "..."}],
          max_completion_tokens=4096
      )

  - id: runlit-hallucination/openai-python/structured-output-wrong-format
    languages: [python]
    severity: ERROR
    message: >
      `response_format={"type": "json_object"}` enables JSON mode but does NOT guarantee
      schema conformance. For structured outputs with schema validation, use
      `response_format={"type": "json_schema", "json_schema": {...}}` or the
      `client.beta.chat.completions.parse()` method with a Pydantic model.
      AI models commonly confuse JSON mode with structured outputs.
    pattern: client.chat.completions.create(..., response_format={"type": "json_object"}, ...)
    metadata:
      category: hallucination
      library: openai-python
      verified_against: ">=1.40.0"
    fix: >
      from pydantic import BaseModel
      class MyResponse(BaseModel):
          name: str
          value: int
      result = client.beta.chat.completions.parse(
          model="gpt-4o",
          messages=[...],
          response_format=MyResponse
      )

  # ── TypeScript / Node.js: additional patterns ──────────────────────────────

  - id: runlit-hallucination/openai-node/dalle-v0-image-create
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      `openai.createImage()` is the openai-node v3.x DALL-E API.
      In openai-node v4+, use `client.images.generate()`.
    pattern: $OPENAI.createImage(...)
    metadata:
      category: deprecated
      library: openai-node
      breaking_version: "4.0.0"
    fix: >
      const response = await openai.images.generate({ model: "dall-e-3", prompt: "...", n: 1 });
      const url = response.data[0].url;

  - id: runlit-hallucination/openai-node/audio-transcribe-v3
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      `openai.createTranscription()` is the openai-node v3.x Whisper API.
      In openai-node v4+, use `client.audio.transcriptions.create()`.
    patterns:
      - pattern: $OPENAI.createTranscription(...)
      - pattern: $OPENAI.createTranslation(...)
    metadata:
      category: deprecated
      library: openai-node
      breaking_version: "4.0.0"
    fix: >
      const transcript = await openai.audio.transcriptions.create({
        model: "whisper-1",
        file: fs.createReadStream("audio.mp3"),
      });

  - id: runlit-hallucination/openai-node/assistants-v1-file-ids
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      `fileIds` / `file_ids` on assistant creation is the Assistants v1 API, removed in v2.
      Use `toolResources` with a vector store instead.
    patterns:
      - pattern: openai.beta.assistants.create({ ..., fileIds: ..., ... })
      - pattern: openai.beta.assistants.create({ ..., file_ids: ..., ... })
    metadata:
      category: hallucination
      library: openai-node
      removed_version: "v2 Assistants API"
    fix: >
      const vectorStore = await openai.beta.vectorStores.create();
      await openai.beta.vectorStores.files.create(vectorStore.id, { file_id: fileId });
      await openai.beta.assistants.create({
        model: "gpt-4o",
        tools: [{ type: "file_search" }],
        tool_resources: { file_search: { vector_store_ids: [vectorStore.id] } },
      });
